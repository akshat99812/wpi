services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORT: "3005"
      WPI_ADMIN_TOKEN: ${WPI_ADMIN_TOKEN:-dev-token}
      WPI_CRON_SCHEDULE: "0 1 * * *"
      DATABASE_URL: postgres://wpi:${POSTGIS_PASSWORD:-wpi}@postgis:5432/wpi
      TILE_CACHE_TTL: ${TILE_CACHE_TTL:-3600}
      # Disk-backed tile cache (power-grid proxy + windmill tiles). Named
      # volume below so cached tiles survive container restarts/rebuilds.
      TILE_CACHE_DIR: /var/cache/tiles
    ports:
      - "3005:3005"
    volumes:
      - ./data:/app/data
      - tile-cache:/var/cache/tiles
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:3005/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI port of the site-analysis engine (parity migration — Phase 2 scaffold).
  # Internal-only: no published ports; reachable on the compose network as
  # http://site-analysis:8000. Express proxies to it (RUNBOOK_v3 §2.6). Reads the
  # SAME PostGIS and the SAME rasters (read-only) as the legacy engine.
  site-analysis:
    build:
      context: ./services/site-analysis
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://wpi:${POSTGIS_PASSWORD:-wpi}@postgis:5432/wpi
      ANALYSIS_DATA_DIR: /app/data
      GWA_TILER_BASE: ${GWA_TILER_BASE:-https://tiles-stag.ramtt.xyz/titiler/gwa4}
      SITE_ANALYSIS_BACKEND: ${SITE_ANALYSIS_BACKEND:-legacy}
    expose:
      - "8000"
    volumes:
      - ./apps/api/data:/app/data:ro
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Proprietary windmill point data for the Pro map. Only reachable on the
  # compose network in prod; in dev we bind 127.0.0.1:5432 so the ingest
  # script can be run from the host.
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: wpi
      POSTGRES_USER: wpi
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD:-wpi}
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpi -d wpi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:3005
      PORT: "3006"
    ports:
      - "3006:3006"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-dev-umami-secret-change-me}
    ports:
      - "3007:3000"
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
  umami-db-data:
  postgis-data:
  tile-cache:
