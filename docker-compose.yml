services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORT: "3005"
      WPI_ADMIN_TOKEN: ${WPI_ADMIN_TOKEN:-dev-token}
      WPI_CRON_SCHEDULE: "0 1 * * *"
    ports:
      - "3005:3005"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:3005/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:3005
      PORT: "3006"
    ports:
      - "3006:3006"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
