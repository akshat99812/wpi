services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      PORT: "3005"
      WPI_ADMIN_TOKEN: ${WPI_ADMIN_TOKEN:-dev-token}
      WPI_CRON_SCHEDULE: "0 1 * * *"
      DATABASE_URL: postgres://wpi:${POSTGIS_PASSWORD:-wpi}@postgis:5432/wpi
      TILE_CACHE_TTL: ${TILE_CACHE_TTL:-3600}
      # Disk-backed tile cache (power-grid proxy + windmill tiles). Named
      # volume below so cached tiles survive container restarts/rebuilds.
      TILE_CACHE_DIR: /var/cache/tiles
      # Site-report PDF export (plan §9.5 rollout). Default OFF — flip to "true"
      # to enable the Pro endpoint. Pool size bounds concurrent Chromium pages.
      REPORT_PDF_ENABLED: ${REPORT_PDF_ENABLED:-false}
      REPORT_BROWSER_POOL_SIZE: ${REPORT_BROWSER_POOL_SIZE:-4}
      # Bearer token for GET /api/site-analysis/report/stats (render metrics:
      # p95 render/queue-wait, 503 rates). Unset → the endpoint 404s (fail-closed,
      # default). Set a secret to enable ops inspection in prod.
      REPORT_METRICS_TOKEN: ${REPORT_METRICS_TOKEN:-}
    # Chromium needs more shared memory than Docker's 64 MB default; we also pass
    # --disable-dev-shm-usage, but a real /dev/shm keeps multi-page renders stable.
    shm_size: "1gb"
    ports:
      - "3005:3005"
    volumes:
      - ./data:/app/data
      - tile-cache:/var/cache/tiles
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:3005/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Proprietary windmill point data for the Pro map. Only reachable on the
  # compose network in prod; in dev we bind 127.0.0.1:5432 so the ingest
  # script can be run from the host.
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: wpi
      POSTGRES_USER: wpi
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD:-wpi}
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpi -d wpi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:3005
      PORT: "3006"
    ports:
      - "3006:3006"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-dev-umami-secret-change-me}
    ports:
      - "3007:3000"
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
  umami-db-data:
  postgis-data:
  tile-cache:
