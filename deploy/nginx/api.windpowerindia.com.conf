server {
    listen 80;
    listen [::]:80;
    server_name api.windpowerindia.com;
    client_max_body_size 20m;

    # CORS handled by the Express app (so we don't get duplicate headers).

    # RAG chat is a Server-Sent Events stream. Disable proxy buffering so deltas
    # reach the client immediately, and raise the read timeout — reasoning models
    # (Grok / o4-mini) can think for well over 60s before the first token.
    location = /api/chat {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
