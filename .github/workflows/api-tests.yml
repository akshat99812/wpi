name: API tests

# Pre-merge gate for apps/api: typecheck + the full bun-test suite, INCLUDING
# the real-Chromium report render (renderPdf.test.ts asserts a 6-page A4 PDF).
# Triggers only when api code or this workflow changes.
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-tests.yml'

concurrency:
  group: api-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: tsc + bun test (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    env:
      CI: 'true'
      # Use system Google Chrome (apt resolves its full dependency tree) instead
      # of Puppeteer's bundled download — the most robust way to get a launchable
      # Chromium in CI. browserPool reads PUPPETEER_EXECUTABLE_PATH (plan §9.1).
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install Google Chrome (+ all shared libs and base fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable fonts-liberation fonts-noto-core

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run build

      - name: Run tests
        run: bun test
