name: E2E (web)

# Pre-merge gate: run the Playwright suite for apps/web before code can be
# pulled to the VPS. Triggers only when web code (or this workflow) changes,
# so data/ingestion commits don't spin up a browser run.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/e2e.yml'

# Cancel a stale run when new commits land on the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    env:
      CI: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the Playwright browser binaries keyed on the resolved version so
      # we only re-download when @playwright/test changes.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Chromium (+ OS deps)
        run: bunx playwright install --with-deps chromium

      # The webServer block in playwright.config.ts starts `bun run dev` and
      # waits on :3000. With CI=true it never reuses an external server.
      - name: Run E2E tests
        run: bunx playwright test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload failure traces
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 30
