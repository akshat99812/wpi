# Local Qdrant for RAG ingestion development.
#
# Bound to 127.0.0.1 only — this is a single-developer local box, not a
# shared host. When we move to the Hostinger VPS, swap this compose for
# the production one there; the ingestion code is env-driven so the
# Python side only needs QDRANT_URL + QDRANT_API_KEY updated in .env.
#
# Reads QDRANT_API_KEY from the .env file sitting next to this compose.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: wind-rag-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # REST API
      - "127.0.0.1:6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - ./qdrant_storage:/qdrant/storage
